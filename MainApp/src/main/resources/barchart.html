<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
  <head>
    <title>
      Chart
    </title>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
     <script src="http://code.jquery.com/jquery-1.9.1.js" type="text/javascript"></script>
    <script src="http://code.highcharts.com/highcharts.js" type="text/javascript"></script>
    <script src="http://code.highcharts.com/modules/exporting.js" type="text/javascript"></script>
    <script src="http://code.highcharts.com/modules/offline-exporting.js" type="text/javascript"></script>
    <script type="text/javascript">
        $(function() {
            $('#container').highcharts({
    chart: {
        type: 'column',
        zoomType: 'x',
        resetZoomButton: {
            position: {
                align: "left",
                x: 10
            },
            relativeTo: "chart"
        },
        backgroundColor: '#403131',
        borderRadius: 5
    },
    title: {
        text: 'RGA'
    },
    subtitle: {
        text: ''
    },
    xAxis: {
       crosshair: true,
       categories:
        
    },
    yAxis: {
        min: 1e-14,
        type: 'logarithmic',
        title: {
            text: 'LN2 Eq. Level (mbar)'
        }
    },
    legend: {
        enabled: false
    },
    tooltip: {
        followTouchMove: false,
        pointFormat: '<b>{point.y} mbar</b>'
    },
    series: [{
        name: 'RGA',
        data:
    }]
});
 });
    </script>
  </head>
  <body>
    <div id="container" style="min-width: 400px; height: 400px; marging-top: 0px;marging-right: 0px;marging-bottom: 0px;marging-left: 0px;  padding-top: 0px;padding-right: 0px;padding-bottom: 0px;padding-left: 0px;"></div>
  </body>
</html>
